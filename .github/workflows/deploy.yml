# Deploy Workflow
# Deploys backend (Railway) and portals (Vercel) on push to master
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN          - Railway API token (railway.app → Account Settings → Tokens)
#   RAILWAY_SERVICE_ID     - Railway service ID for the backend
#   VERCEL_TOKEN           - Vercel API token (vercel.com → Settings → Tokens)
#   EXPO_TOKEN             - Expo access token (for mobile builds)
#   EXPO_OWNER             - Expo account username

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - caregiver-portal
          - admin-portal

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.component == 'backend' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == ''
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Railway secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Backend deployment skipped: RAILWAY_TOKEN or RAILWAY_SERVICE_ID not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach

  deploy-caregiver-portal:
    name: Deploy Caregiver Portal to Vercel
    runs-on: ubuntu-latest
    if: |
      (github.event.inputs.component == 'caregiver-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Caregiver portal deployment skipped: VERCEL_TOKEN not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Caregiver Portal to Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./caregiver-portal
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes

  deploy-admin-portal:
    name: Deploy Admin Portal to Vercel
    runs-on: ubuntu-latest
    if: |
      (github.event.inputs.component == 'admin-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Admin portal deployment skipped: VERCEL_TOKEN not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Admin Portal to Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./admin-portal
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes
