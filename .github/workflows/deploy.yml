# Deploy Workflow
# Deploys backend (Railway) and portals (Vercel) on push to master
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN             - Railway API token (railway.app → Account Settings → Tokens)
#   RAILWAY_SERVICE_ID        - Railway service ID for the backend
#   VERCEL_TOKEN              - Vercel API token (vercel.com → Settings → Tokens)
#   EXPO_TOKEN                - Expo access token (for mobile builds)
#   EXPO_OWNER                - Expo account username
#   VITE_SENTRY_DSN_CAREGIVER - Sentry DSN for caregiver portal (optional)
#   VITE_SENTRY_DSN_ADMIN     - Sentry DSN for admin portal (optional)
#
# Required GitHub Variables (Settings → Variables, not Secrets):
#   VERCEL_ORG_ID                  - Vercel team ID  (team_...)
#   VERCEL_PROJECT_ID_CAREGIVER    - Vercel project ID for caregiver portal  (prj_...)
#   VERCEL_PROJECT_ID_ADMIN        - Vercel project ID for admin portal  (prj_...)
#   KARUNA_API_URL                 - Production API base URL (for smoke tests)
#   KARUNA_PORTAL_URL              - Production caregiver portal URL (for smoke tests)
#   KARUNA_ADMIN_URL               - Production admin portal URL (for smoke tests)

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - caregiver-portal
          - admin-portal

jobs:
  test:
    name: Test Gate (coverage must pass before deploy)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: karuna_test
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: karuna_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run mobile tests with coverage gate
        run: npm run test:coverage -- --runInBand --testPathIgnorePatterns='__tests__/server'

      - name: Initialize test database schema
        env:
          PGPASSWORD: test_password
        run: |
          psql -h localhost -U karuna_test -d karuna_test -f server/db/init.sql
          psql -h localhost -U karuna_test -d karuna_test -f server/db/admin_tables.sql

      - name: Run database migrations
        run: node server/db/migrations/run.js
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: karuna_test
          DB_USER: karuna_test
          DB_PASSWORD: test_password

      - name: Run server tests
        run: npm run test:server
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: karuna_test
          DB_USER: karuna_test
          DB_PASSWORD: test_password

  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() && needs.test.result == 'success' &&
      (github.event.inputs.component == 'backend' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Railway secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Backend deployment skipped: RAILWAY_TOKEN or RAILWAY_SERVICE_ID not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach

  deploy-caregiver-portal:
    name: Deploy Caregiver Portal to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() && needs.test.result == 'success' &&
      (github.event.inputs.component == 'caregiver-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Caregiver portal deployment skipped: VERCEL_TOKEN not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Caregiver Portal to Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./caregiver-portal
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_CAREGIVER }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_CAREGIVER }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes --build-env VITE_SENTRY_DSN=$VITE_SENTRY_DSN

  deploy-admin-portal:
    name: Deploy Admin Portal to Vercel
    runs-on: ubuntu-latest
    needs: test
    if: |
      always() && needs.test.result == 'success' &&
      (github.event.inputs.component == 'admin-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Admin portal deployment skipped: VERCEL_TOKEN not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Deploy Admin Portal to Vercel
        if: steps.check-secrets.outputs.skip != 'true'
        # KNOWN ISSUE (docs/PROD_DEPLOY_FIXES_2026-05-31.md issue 2): the
        # Vercel admin project has Root Directory = "admin-portal" set in the
        # dashboard, which doubles the path for CLI deploys and fails this
        # step. The fix is clearing that field in the Vercel dashboard
        # (Project → Settings → Build & Development → Root Directory); the
        # caregiver project (empty Root Directory) deploys fine with the
        # identical command. continue-on-error keeps smoke tests running for
        # the backend + caregiver portal until the dashboard is fixed.
        continue-on-error: true
        working-directory: ./admin-portal
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_ADMIN }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN_ADMIN }}
        run: npx vercel --prod --token $VERCEL_TOKEN --yes --build-env VITE_SENTRY_DSN=$VITE_SENTRY_DSN

  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-caregiver-portal, deploy-admin-portal]
    if: |
      always() &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped') &&
      (needs.deploy-caregiver-portal.result == 'success' || needs.deploy-caregiver-portal.result == 'skipped') &&
      (needs.deploy-admin-portal.result == 'success' || needs.deploy-admin-portal.result == 'skipped') &&
      (needs.deploy-backend.result == 'success' || needs.deploy-caregiver-portal.result == 'success' || needs.deploy-admin-portal.result == 'success')
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run smoke tests
        env:
          KARUNA_API_URL: ${{ vars.KARUNA_API_URL }}
          KARUNA_PORTAL_URL: ${{ vars.KARUNA_PORTAL_URL }}
          KARUNA_ADMIN_URL: ${{ vars.KARUNA_ADMIN_URL }}
        run: bash scripts/smoke-test.sh
