# Deploy Workflow
# Deploys backend (Railway) and portals (Cloudflare Pages) on push to master
#
# Required GitHub Secrets:
#   RAILWAY_TOKEN          - Railway API token (railway.app → Account Settings → Tokens)
#   RAILWAY_SERVICE_ID     - Railway service ID for the backend
#   API_URL                - Production backend URL (e.g. https://karuna-api-production.up.railway.app)
#   CLOUDFLARE_API_TOKEN   - Cloudflare API token with Pages:Edit permission
#   CLOUDFLARE_ACCOUNT_ID  - Cloudflare account ID
#   EXPO_TOKEN             - Expo access token (for mobile builds)
#   EXPO_OWNER             - Expo account username

name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - backend
          - caregiver-portal
          - admin-portal

jobs:
  deploy-backend:
    name: Deploy Backend to Railway
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.component == 'backend' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == ''
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check Railway secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.RAILWAY_TOKEN }}" ] || [ -z "${{ secrets.RAILWAY_SERVICE_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Backend deployment skipped: RAILWAY_TOKEN or RAILWAY_SERVICE_ID not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Install Railway CLI
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        if: steps.check-secrets.outputs.skip != 'true'
        working-directory: ./server
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service ${{ secrets.RAILWAY_SERVICE_ID }} --detach

  build-caregiver-portal:
    name: Build Caregiver Portal
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.component == 'caregiver-portal' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: caregiver-portal/package-lock.json

      - name: Install dependencies
        run: cd caregiver-portal && npm ci

      - name: Build
        run: cd caregiver-portal && npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: caregiver-portal-dist
          path: caregiver-portal/dist

  build-admin-portal:
    name: Build Admin Portal
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.component == 'admin-portal' ||
      github.event.inputs.component == 'all' ||
      github.event.inputs.component == ''

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-portal/package-lock.json

      - name: Install dependencies
        run: cd admin-portal && npm ci

      - name: Build
        run: cd admin-portal && npm run build
        env:
          VITE_API_URL: ${{ secrets.API_URL }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-portal-dist
          path: admin-portal/dist

  deploy-caregiver-portal:
    name: Deploy Caregiver Portal to Cloudflare
    runs-on: ubuntu-latest
    needs: build-caregiver-portal
    if: |
      (github.event.inputs.component == 'caregiver-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Check Cloudflare secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Caregiver portal deployment skipped: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: caregiver-portal-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.skip != 'true'
        uses: cloudflare/pages-action@v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: karuna-portal
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

  deploy-admin-portal:
    name: Deploy Admin Portal to Cloudflare
    runs-on: ubuntu-latest
    needs: build-admin-portal
    if: |
      (github.event.inputs.component == 'admin-portal' ||
       github.event.inputs.component == 'all' ||
       github.event.inputs.component == '') &&
      github.event_name != 'pull_request'
    environment: production

    steps:
      - name: Check Cloudflare secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.CLOUDFLARE_API_TOKEN }}" ] || [ -z "${{ secrets.CLOUDFLARE_ACCOUNT_ID }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "⚠️ Admin portal deployment skipped: CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID not configured"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download artifact
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          name: admin-portal-dist
          path: dist

      - name: Deploy to Cloudflare Pages
        if: steps.check-secrets.outputs.skip != 'true'
        uses: cloudflare/pages-action@v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: karuna-admin
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
